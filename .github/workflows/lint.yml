name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate .uproject JSON
        run: |
          for f in $(find . -maxdepth 2 -name '*.uproject'); do
            echo "Checking $f"
            python3 -c "import json,sys; json.load(open('$f'))" || exit 1
          done

      - name: Verify SDK submodule present
        run: |
          test -f Plugins/AsobiSDK/AsobiSDK.uplugin || {
            echo "AsobiSDK submodule missing or not checked out"
            exit 1
          }

      - name: Check Build.cs files reference AsobiSDK
        run: |
          if ! grep -r "AsobiSDK" Source/*/*.Build.cs; then
            echo "No Build.cs references AsobiSDK"
            exit 1
          fi
